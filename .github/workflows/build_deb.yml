name: Build Iridium DEB

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Package DEB
    runs-on: macos-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_15.2.app || true

      - name: Install Packaging Tools (ldid & dpkg)
        run: |
          brew install ldid dpkg

      - name: Build AuxiliaryAgent
        run: |
          # 【修改点 1】：弃用原有的 build.sh，直接使用 xcodebuild 指定输出目录，确保我们能找到产物
          xcodebuild clean build \
            -project AuxiliaryAgent/AuxiliaryAgent.xcodeproj \
            -scheme AuxiliaryAgent \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath agent_build_output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Build Iridium Main App
        run: |
          xcodebuild clean build \
            -workspace App.xcworkspace \
            -scheme iridium \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath build_output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Prepare DEB Layout and Inject Dependencies
        run: |
          mkdir -p layout/Applications
          
          # 1. 拷贝主程序
          APP_DIR=$(find build_output/Build/Products -name "*.app" | head -n 1)
          cp -r "$APP_DIR" layout/Applications/
          APP_NAME=$(basename "$APP_DIR")
          APP_FULL_PATH="layout/Applications/$APP_NAME"
          
          # 2. 拷贝 DEBIAN 控制目录并替换版本号
          cp -r Workflow/DEBIAN layout/
          sed -i '' "s/@@VERSION@@/1.0.${{ github.run_number }}/g" layout/DEBIAN/control
          
          # 【修改点 2】：手动解压 fouldecrypt.zip 并强制注入到 app 中
          echo "Injecting fouldecrypt engines..."
          cd Workflow
          unzip -o fouldecrypt.zip
          cp fouldecrypt.tfp0 fouldecrypt.krw fouldecrypt.kernrw "../$APP_FULL_PATH/"
          cd ..
          
          # 【修改点 3】：手动寻找编译好的 AuxiliaryAgent 并注入到 app 中
          echo "Injecting AuxiliaryAgent..."
          AGENT_BIN=$(find agent_build_output/Build/Products -name "AuxiliaryAgent" -type f | head -n 1)
          if [ -n "$AGENT_BIN" ]; then
            cp "$AGENT_BIN" "$APP_FULL_PATH/"
            echo "Successfully injected AuxiliaryAgent."
          else
            echo "Error: AuxiliaryAgent not found!"
            exit 1
          fi

      - name: Sign Binaries with ldid
        run: |
          APP_DIR=$(find layout/Applications -name "*.app" | head -n 1)
          APP_EXEC_NAME=$(basename "$APP_DIR" .app)
          
          # 修复基础权限
          chmod -R 0755 "$APP_DIR"
          if [ -f "layout/DEBIAN/postinst" ]; then chmod 0755 layout/DEBIAN/postinst; fi
          if [ -f "layout/DEBIAN/postrm" ]; then chmod 0755 layout/DEBIAN/postrm; fi
          
          # 提取 Entitlements 路径
          ENTITLEMENTS="Workflow/Entitlements.plist"
          
          if [ -f "$ENTITLEMENTS" ]; then
            echo "Signing Main App..."
            ldid -S"$ENTITLEMENTS" "$APP_DIR/$APP_EXEC_NAME"
            
            # 【修改点 4】：为提权代理 AuxiliaryAgent 签发 Root 权限（非常关键，否则无法运行）
            if [ -f "$APP_DIR/AuxiliaryAgent" ]; then
              echo "Signing AuxiliaryAgent..."
              ldid -S"$ENTITLEMENTS" "$APP_DIR/AuxiliaryAgent"
            fi
          fi
          
          # 对底层脱壳引擎和动态库进行签名
          find "$APP_DIR" -type f -name "fouldecrypt.*" -exec ldid -S {} \;
          find "$APP_DIR" -type f -name "*.dylib" -exec ldid -S {} \;

      - name: Package to DEB
        run: |
          dpkg-deb -Zxz -b layout Iridium.deb

      - name: Upload DEB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Iridium-Release-DEB
          path: Iridium.deb
