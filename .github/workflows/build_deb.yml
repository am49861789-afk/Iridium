name: Build Iridium DEB

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # 允许在 GitHub Actions 页面手动点击运行

jobs:
  build:
    name: Build and Package DEB
    runs-on: macos-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_15.2.app || true

      - name: Install Packaging Tools (ldid & dpkg)
        run: |
          # ldid 用于越狱应用的伪签名，dpkg 用于构建 deb 包
          brew install ldid dpkg

      - name: Build AuxiliaryAgent
        run: |
          # 编译辅助提权代理应用
          if [ -d "AuxiliaryAgent" ]; then
            cd AuxiliaryAgent
            chmod +x build.sh
            ./build.sh
            cd ..
          fi

      - name: Build Iridium Main App
        run: |
          # 编译主程序，禁用官方签名，指定 DerivedData 输出目录方便提取
          xcodebuild clean build \
            -workspace App.xcworkspace \
            -scheme iridium \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath build_output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Prepare DEB Layout and Execute Workflow Scripts
        run: |
          # 1. 创建标准的越狱应用目录结构
          mkdir -p layout/Applications
          
          # 2. 查找编译生成的 .app 并拷贝到 layout 目录中
          APP_DIR=$(find build_output/Build/Products/Release-iphoneos -name "*.app" | head -n 1)
          cp -r "$APP_DIR" layout/Applications/
          APP_NAME=$(basename "$APP_DIR")
          
          # 3. 拷贝 DEBIAN 控制目录
          cp -r Workflow/DEBIAN layout/
          
          # 4. 执行项目的预处理脚本（解压 fouldecrypt 等依赖并注入到 app 中）
          cd Workflow
          chmod +x *.sh
          ./prepare.fouldecrypt.sh || true
          
          # 如果 prepare.app.sh 需要 app 路径作为参数，传入相对路径
          ./prepare.app.sh "../layout/Applications/$APP_NAME" || true
          cd ..

      - name: Sign Binaries with ldid
        run: |
          APP_DIR=$(find layout/Applications -name "*.app" | head -n 1)
          APP_EXEC_NAME=$(basename "$APP_DIR" .app)
          
          # 确保所有的二进制可执行文件和脚本有正确权限
          chmod -R 0755 "$APP_DIR"
          if [ -f "layout/DEBIAN/postinst" ]; then chmod 0755 layout/DEBIAN/postinst; fi
          if [ -f "layout/DEBIAN/postrm" ]; then chmod 0755 layout/DEBIAN/postrm; fi
          
          # 使用 Workflow 提供的 Entitlements.plist 对主执行文件进行签名
          if [ -f "Workflow/Entitlements.plist" ]; then
            echo "Signing with ldid..."
            ldid -SWorkflow/Entitlements.plist "$APP_DIR/$APP_EXEC_NAME"
            
            # 遍历寻找 .dylib 或其他辅助二进制文件并签名（按需）
            find "$APP_DIR" -type f -name "*.dylib" -exec ldid -S {} \;
          fi

      - name: Package to DEB
        run: |
          # 使用 dpkg-deb 以 xz 高压缩率打包
          dpkg-deb -Zxz -b layout Iridium.deb

      - name: Upload DEB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Iridium-Release-DEB
          path: Iridium.deb
